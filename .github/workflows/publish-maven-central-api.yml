name: publish-maven-central-api

on:
  workflow_dispatch:
    inputs:
      publishing_type:
        description: "Central Portal publishing type"
        required: true
        default: "USER_MANAGED"
        type: choice
        options:
          - USER_MANAGED
          - AUTOMATIC

permissions:
  contents: read

jobs:
  publish-maven-central-api:
    name: publish-maven-central-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Import GPG signing key
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${SIGNING_KEY_BASE64}" ]]; then
            echo "SIGNING_KEY_BASE64 is empty or missing."
            exit 1
          fi

          printf '%s' "${SIGNING_KEY_BASE64}" | base64 --decode > signing-key.asc || {
            echo "SIGNING_KEY_BASE64 is not valid base64."
            exit 1
          }

          if ! grep -q "BEGIN PGP PRIVATE KEY BLOCK" signing-key.asc; then
            echo "SIGNING_KEY_BASE64 decoded successfully, but it is not an ASCII-armored private PGP key."
            echo "Recreate it from: gpg --armor --export-secret-keys <KEY_ID>"
            exit 1
          fi

          gpg --batch --import signing-key.asc
          rm signing-key.asc

      - name: Build signed Central Portal bundle
        run: ./gradlew clean centralPortalBundle
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mayorsystem-api-central-portal-bundle
          path: build/central-portal/*.zip

      - name: Upload to Maven Central Portal
        shell: bash
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          PUBLISHING_TYPE: ${{ inputs.publishing_type }}
        run: |
          set -euo pipefail

          bundle="$(find build/central-portal -name '*.zip' -print -quit)"
          if [[ -z "${bundle}" ]]; then
            echo "Central Portal bundle was not created."
            exit 1
          fi

          token="$(printf '%s:%s' "${CENTRAL_PORTAL_USERNAME}" "${CENTRAL_PORTAL_PASSWORD}" | base64 -w 0)"
          deployment_name="mayorsystem-api-${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}"

          curl --fail-with-body --request POST \
            --header "Authorization: Bearer ${token}" \
            --form "bundle=@${bundle}" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=${deployment_name}&publishingType=${PUBLISHING_TYPE}"

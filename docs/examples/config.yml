# Admin-only settings live here.
admin:
  # Audit log (who changed what and when)
  audit:
    # How many recent events to keep in memory for fast menu browsing.
    ring_size: 200
    # Rotate audit.log when it grows beyond this size (bytes).
    max_bytes: 5000000
    # Limit how much of the audit log we read on startup (bytes).
    tail_max_bytes: 1000000

  offline_cache:
    # How many offline player records to scan per tick when rebuilding the cache.
    batch_size: 500

# ---------------------------------------------------------------------------
# Showcase mode (NPC vs leaderboard hologram)
# - SWITCHING: show the leaderboard hologram during elections, and the NPC once a mayor is elected.
# - INDIVIDUAL: keep each enabled display active at its own location.
# ---------------------------------------------------------------------------
showcase:
  mode: "SWITCHING"
  switching:
    # Legacy keys (kept for older configs; switching behavior is automatic now)
    election_open: "HOLOGRAM"
    election_closed: "NPC"

# ---------------------------------------------------------------------------
# Mayor NPC (statue)
# Spawn with: /%title_command% admin npc spawn
# Remove with: /%title_command% admin npc remove
# ---------------------------------------------------------------------------
npc:
  mayor:
    enabled: false
    # Provider selection:
    # - auto      (tries Citizens -> FancyNpcs)
    # - citizens  (requires the Citizens plugin)
    # - fancynpcs (requires the FancyNpcs plugin)
    provider: "auto"
    # (read-only) provider actually in use after selection ("citizens"/"fancynpcs"/"disabled")
    backend: "disabled"

    # If true, the chunk containing the Mayor NPC will be kept loaded via a plugin chunk ticket
    # (Paper supports this; on non-Paper servers it simply loads the chunk at startup/spawn).
    keep_chunk_loaded: true

    # Skin to use when there is no elected mayor (username/skin id depending on provider).
    default_skin: "Steve"

    # Spawn location
    world: "world"
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0

    citizens:
      npc_id: 0
      entity_uuid: ""

    fancynpcs:
      npc_name: "mayorsystem_mayor_npc"

# ---------------------------------------------------------------------------
# Leaderboard Hologram (DecentHolograms)
# Spawn with: /%title_command% admin hologram spawn
# Remove with: /%title_command% admin hologram remove
# NOTE: In SWITCHING mode, the hologram uses the Mayor NPC location.
# ---------------------------------------------------------------------------
hologram:
  leaderboard:
    enabled: false
    name: "mayorsystem_leaderboard"
    # How often to refresh lines (ticks). Set to 0 to rely on event-driven updates only.
    update_interval_ticks: 0
    # How many leaderboard entries to fill in the lines below.
    max_entries: 3
    # Vertical offset used in SWITCHING mode (relative to the NPC location).
    # Default is one block above the NPC head (about 2.8 blocks).
    switching_y_offset: 2.8

    # Spawn location (used in INDIVIDUAL mode only)
    world: "world"
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0

    # Lines displayed in the hologram.
    # Supports PlaceholderAPI placeholders if installed.
    lines:
      - "<gold><bold>%title_name% Election Leaderboard</bold></gold>"
      - "<gray>Term #%mayorsystem_leaderboard_term%</gray>"
      - "<gray>Voting closes:</gray> <white>%mayorsystem_election_close%</white>"
      - ""
      - "<yellow>#1</yellow> %mayorsystem_leaderboard_1_name% <dark_gray>-</dark_gray> <gold>%mayorsystem_leaderboard_1_votes%</gold>"
      - "<yellow>#2</yellow> %mayorsystem_leaderboard_2_name% <dark_gray>-</dark_gray> <gold>%mayorsystem_leaderboard_2_votes%</gold>"
      - "<yellow>#3</yellow> %mayorsystem_leaderboard_3_name% <dark_gray>-</dark_gray> <gold>%mayorsystem_leaderboard_3_votes%</gold>"

    # Lines displayed when elections are NOT open.
    closed_lines:
      - "<gold><bold>%title_name% Elections</bold></gold>"
      - "<red>Voting is closed</red>"
      - ""
      - "<gray>Next term:</gray> <white>#%mayorsystem_leaderboard_term%</white>"
      - "<gray>Next election opens:</gray> <white>%mayorsystem_election_open%</white>"
      - "<gray>Come back during the vote window.</gray>"










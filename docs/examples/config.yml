title:
  name: "Mayor"
  player_prefix: "<gold><bold>%title_name%</bold></gold>"
  # If true, MayorSystem applies/removes the group below for the elected player.
  # Requires LuckPerms. Manage the group's permissions/meta in LuckPerms directly.
  username_group_enabled: true
  username_group: "mayor_current"
  chat_prefix: "<gold><bold>%title_name%</bold></gold> <dark_gray>>></dark_gray> "

enabled: true          # master switch (kills everything if false)
public_enabled: true   # NEW: disables mayor system for regular players only

# Which subsystems are affected when enabled=false.
# Options: SCHEDULE, ACTIONS, PERKS, MAYOR_NPC, BROADCASTS
enable_options:
  - SCHEDULE
  - ACTIONS
  - PERKS
  - MAYOR_NPC
  - BROADCASTS

pause:
  enabled: false       # pause elections/term schedule without disabling the plugin
  # Which subsystems are affected when paused=true.
  # Options: SCHEDULE, ACTIONS, PERKS, MAYOR_NPC, BROADCASTS
  options:
    - SCHEDULE
    - ACTIONS
    - PERKS
    - MAYOR_NPC
    - BROADCASTS

data:
  store:
    # Storage backend: "sqlite" or "mysql"
    type: "sqlite"
    sqlite:
      file: "elections.db"
      async_writes: true
      # If true, all writes are forced to be synchronous (safer, but blocks the caller thread).
      strict: false
      journal_mode: "WAL"
      synchronous: "NORMAL"
      busy_timeout_ms: 2000
    mysql:
      host: "localhost"
      port: 3306
      database: "mayorsystem"
      user: "root"
      password: ""
      use_ssl: false
      server_timezone: "UTC"
      params: "allowPublicKeyRetrieval=true"
      # Connection pool size (HikariCP). Increase for busy servers.
      pool_size: 4
      async_writes: true
      strict: true


term:
  length: "P14D"                 # ISO-8601 Duration (14 days)
  vote_window: "P3D"             # voting window duration
  election_after_term_end: false # true = voting starts after term ends (gap before next term)
  first_term_start: "9999-12-31T23:59:59-05:00"  # OffsetDateTime
  perks_per_term: 2

  bonus_term:
    enabled: true
    every_x_terms: 4
    perks_per_bonus_term: 4

apply:
  playtime_minutes: 600
  cost: 1000

election:
  # If true, players can change their vote any time before voting closes.
  allow_vote_change: true

  # Optional UX: announce when elections become open.
  # Uses store flags to avoid spamming every tick/restart.
  broadcast:
    enabled: true
    mode: "TITLE"   # TITLE, CHAT, or BOTH

    # Message templates (MiniMessage, plus PlaceholderAPI if installed)
    open:
      chat_lines:
        # These are the body lines only.
        # MayorSystem wraps them with a bold/gold header + footer so they stand out.
        - "<yellow><bold>Elections are now OPEN!</bold></yellow> <gray>(Term #%term%)</gray>"
        - "<gray>Vote now: <yellow>/%title_command% vote</yellow> or open the %title_name% menu.</gray>"
      title: "<yellow><bold>Elections Open!</bold></yellow>"
      subtitle: "<gray>Vote now with <yellow>/%title_command%</yellow></gray>"

    elected:
      chat_lines:
        # Body lines only (wrapped by MayorSystem).
        - "<green><bold>New %title_name% elected!</bold></green> <gray>(Term #%term%)</gray>"
        - "<gray>%title_name%:</gray> <yellow>%mayor_name%</yellow>"
      title: "<green><bold>New %title_name%!</bold></green>"
      subtitle: "<yellow>%mayor_name%</yellow> <gray>(Term #%term%)</gray>"

    no_candidates:
      chat: "<red>Election extended</red> <gray>(no players applied)</gray> <gray>(Term #%term%)</gray> <yellow>Apply now:</yellow> <white>/%title_command% apply</white>"
      title: "<red><bold>Election Extended</bold></red>"
      subtitle: "<gray>No players applied.</gray> <yellow>Apply now: /%title_command% apply</yellow>"

    title:
      fade_in_ms: 500
      stay_ms: 4000
      fade_out_ms: 800

  # How to resolve a tie (same highest vote count):
  # - SEEDED_RANDOM
  # - INCUMBENT
  # - EARLIEST_APPLICATION
  # - ALPHABETICAL
  tie_policy: "SEEDED_RANDOM"

  # Candidate step-down rules.
  stepdown:
    allow_reapply: false

  # Mayor step-down (mid-term) behavior:
  # - OFF: disabled
  # - NO_MAYOR: clear mayor + perks until next term
  # - KEEP_MAYOR: keep current mayor until new term
  mayor_stepdown: "OFF"

sell_bonus:
  enabled: true
  # How multiple multipliers stack when multiple sell perks are selected:
  # MAX or PRODUCT
  stack_mode: "MAX"
  # How the "All" sell perk stacks with category perks:
  # - true  => All bonus applies on top of category bonuses (stacked)
  # - false => All bonus applies only to items with no active category bonus
  all_bonus_stack: true

custom_requests:
  # Max custom perk requests a player can submit for a given term.
  limit_per_term: 2

  # Who can request a custom perk:
  # - DISABLED         -> custom perk requests are disabled
  # - NONE             -> any candidate can request
  # - ELECTED_ONCE     -> must have been elected mayor at least once in the past
  # - APPLY_REQUIREMENTS -> must meet apply requirements (currently: playtime threshold)
  request_condition: "APPLY_REQUIREMENTS"

ux:
  # How long a chat prompt session can sit idle before it automatically expires.
  # This prevents players from being "stuck" in a prompt hours later.
  chat_prompt_timeout_seconds: 300

  # Max character lengths for chat prompts.
  # These are hard caps to prevent chat spam / huge config strings.
  chat_prompts:
    max_length:
      # Candidate bio (shown on candidate cards)
      bio: 50
      # Custom perk request title
      title: 50
      # Custom perk request description
      description: 50


skins:
  # Delay before writing skins-cache.json after updates.
  cache_save_delay_ticks: 60

perks:
  enabled: true
  # How many players to refresh per tick when reapplying perk effects.
  refresh_batch_size: 20

  sections:

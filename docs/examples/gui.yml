menus:
  main:
    title: <gradient:#0f0b17:#7b2cbf>%title_name%</gradient> <gray>Obsidian Court</gray>
    header:
      name: <gradient:#0f0b17:#7b2cbf>%title_name% Obsidian Throne</gradient>
      lore:
        click_view: <gray>Click to view:</gray> <white>Status & Chronicle</white>
        current_term_active: <gray>Current term:</gray> <white>#%term%</white>
        current_term_not_started: <gray>Current term:</gray> <white>Not started</white>
        election_closed: <color:#ff758f>Crown Vote is CLOSED</color>
        election_open: <color:#c77dff>Crown Vote is OPEN</color>
        hint: <dark_gray>Use the buttons below.</dark_gray>
        mayor: <gray>%title_name%:</gray> <white>%mayor%</white>
    vote:
      name: <light_purple> Cast Oath</light_purple>
      lore:
        closed: <color:#ff758f>Voting is CLOSED</color>
        open: <color:#c77dff>Voting is OPEN</color>
        pick: <gray>Pick a candidate.</gray>
    apply:
      name: <color:#c77dff> Apply</color>
      lore: <gray>Run for the next term.</gray>
    candidate:
      name: <gradient:#240046:#c77dff> Claimant</gradient>
      lore:
        apply_hint: <gray>Open to apply and manage perks.</gray>
        ask_admin: <gray>Ask an admin for access.</gray>
        no_permission: <color:#ff758f>No permission</color>
        not_applied: <color:#ff758f>Not applied yet.</color>
        open: <gray>Open your candidate dashboard.</gray>
        term: '<dark_gray>Term #%term%</dark_gray>'
    staff:
      name: <color:#ff758f> Court Panel</color>
      lore: <gray>Staff tools.</gray>
  status:
    title: <gradient:#0f0b17:#7b2cbf> %title_name% Status</gradient>
    timeline:
      name: <gradient:#3c096c:#9d4edd> Chronicle</gradient>
      lore:
        current_term: <gray>Current term:</gray> <white>%term%</white>
        next_term: <gray>Next term:</gray> <white>#%term%</white>
        no_override: <dark_gray>(no overrides)</dark_gray>
        override: <color:#c77dff>Admin override:</color> <white>%state%</white>
        term_start: <gray>Next term starts:</gray> <white>%time%</white>
        voting_close: <gray>Voting closes:</gray> <white>%time%</white>
        voting_open: <gray>Voting opens:</gray> <white>%time%</white>
      not_started: Not started
    current_mayor:
      name: <gradient:#3c096c:#9d4edd> Current %title_name%</gradient>
      lore:
        name: <gray>Name:</gray> <white>%name%</white>
        active_perks: <gray>Active perks:</gray>
        more: <dark_gray>+%count% more</dark_gray>
        none: <dark_gray>No perks selected (or no mayor yet).</dark_gray>
        perk_entry: <gray>-</gray> %perk%
    election:
      name: <gradient:#0f0b17:#7b2cbf> Crown Vote</gradient>
      lore:
        closed: <gray>Crown Vote is not open right now.</gray>
        closed_hint: <dark_gray>Come back during the vote window.</dark_gray>
        entry: <gray>#%rank%</gray> <white>%name%</white> <dark_gray>-</dark_gray> <gradient:#3c096c:#9d4edd>%votes%</gradient>
        live: <gray>Crown Vote is LIVE for term:</gray> <white>#%term%</white>
        no_candidates: <gray>No candidates yet.</gray>
        top_hint: <dark_gray>(top 3 by votes)</dark_gray>
    none: None
  vote:
    title: <gradient:#10002b:#c77dff> Cast Oath</gradient>
    title_page: <gradient:#10002b:#c77dff>Cast Oath</gradient> <gray>(Page %page%/%total_pages%)</gray>
    header:
      name: <gradient:#3c096c:#9d4edd>Cast Oath</gradient>
      lore:
        closes: <gray>Voting closes:</gray> <white>%time%</white>
        page: <gray>Page:</gray> <white>%page%/%total_pages%</white>
        perk_sort_none: <gray>Perk sort:</gray> <dark_gray>no perks selected</dark_gray>
        perk_sort_selected: <gray>Perk sort:</gray> <white>%count% selected</white> <dark_gray>(%mode%)</dark_gray>
        search: <gray>Search:</gray> <white>%filter%</white>
        sort: <gray>Sort:</gray> <white>%sort%</white>
        status: <gray>Status:</gray> %status%
        term: <gray>Term:</gray> <white>#%term%</white>
        time_left: <gray>Time left:</gray> <white>%time%</white>
        voted_for: <gray>You voted for:</gray> <gradient:#3c096c:#9d4edd>%name%</gradient>
    candidate:
      name:
        active: <light_purple><bold>%name%</bold></light_purple>
        inactive: <color:#c77dff>%name%</color>
      lore:
        bio: <gray>Bio:</gray> <white>%bio%</white>
        click_vote: <color:#c77dff>Click to vote</color>
        match: <gray>Match:</gray> <white>%match%/%total%</white>
        not_eligible: <gray>Not eligible to vote</gray>
        perk_more: <dark_gray>+%count% more</dark_gray>
        perk_preview: <dark_gray></dark_gray> %perk%
        perks: <gray>Perks:</gray> <white>%count%</white>
        status: <gray>Status:</gray> %status% <dark_gray></dark_gray> %online%
      online:
        offline: <dark_gray>Offline</dark_gray>
        online: <color:#c77dff>Online</color>
      status:
        active: <color:#c77dff>Active</color>
        process: <gradient:#3c096c:#9d4edd>In process</gradient>
        removed: <color:#ff758f>Removed</color>
    controls:
      clear_search:
        name: <color:#ff758f>Clear search</color>
        lore: <gray>Remove the name filter.</gray>
      next:
        name: <gray>Next </gray>
        lore:
          page: <gray>Page:</gray> <white>%page%/%total_pages%</white>
      perk_sort:
        name: <light_purple>Perk sort</light_purple>
        lore:
          '1': <gray>Pick perks to prioritize in sorting.</gray>
          configure: <dark_gray>Click to configure.</dark_gray>
          mode: <gray>Mode:</gray> <white>%mode%</white>
          none: <dark_gray>No perks selected.</dark_gray>
          selected: <gray>Selected:</gray> <white>%count%</white>
      prev:
        name: <gray> Prev</gray>
        lore:
          page: <gray>Page:</gray> <white>%page%/%total_pages%</white>
      search:
        name: <light_purple>Search</light_purple>
        lore:
          current: <gray>Current:</gray> <white>%filter%</white>
          filter: <gray>Filter candidates by name.</gray>
          none: <dark_gray>(no active filter)</dark_gray>
          type: <dark_gray>Click to type.</dark_gray>
        prompt_title: <gradient:#3c096c:#9d4edd>Search candidates</gradient>
      sort:
        name: <light_purple>Sort</light_purple>
        lore:
          alphabetical: <gray>-</gray> Alphabetical
          current: <gray>Current:</gray> <white>%sort%</white>
          cycle: <dark_gray>Click to cycle:</dark_gray>
          online_first: <gray>-</gray> Online first
          perk_match: <gray>-</gray> Perk match
    sort:
      alphabetical: Alphabetical
      online_first: Online first
      perk_match: Perk match
    state:
      closed: <color:#ff758f>CLOSED</color>
      open: <color:#c77dff>OPEN</color>
    perk_sort:
      mode_non_strict: Non-strict
      mode_strict: Strict
    receipt:
      name: '<gradient:#3c096c:#9d4edd>Oath Cast: %name%</gradient>'
      change_allowed: <gray>You can change your vote until the election closes.</gray>
      closed: <color:#ff758f>Voting is closed</color>
      locked: <gray>Your vote is locked for this term.</gray>
      view_perks: <dark_gray>Click to view perks.</dark_gray>
    unknown_name: Unknown
    unavailable:
      name: <color:#ff758f>Voting unavailable</color>
  vote_confirm:
    title: <gradient:#3c096c:#9d4edd>Confirm Oath</gradient>
    head:
      name: <color:#c77dff>Swear your oath to %name%?</color>
      lore:
        bio_header: <gray>Bio:</gray>
        perks_hint: <dark_gray>Click this head to view their perks.</dark_gray>
        status: <gray>Status:</gray> %status%
        term: <gray>Term:</gray> <white>#%term%</white>
        vote_change_no: <gray>Your vote is final for this term.</gray>
        vote_change_yes: <gray>You can change your vote until the election closes.</gray>
    status:
      active: <color:#c77dff>ACTIVE</color>
      process: <gradient:#3c096c:#9d4edd>PROCESS</gradient>
      removed: <color:#ff758f>REMOVED</color>
    bio:
      empty: <gray>No candidate bio.</gray>
      line: <gray>%line%</gray>
    confirm:
      name: <color:#c77dff>Confirm</color>
      lore: <gray>Cast your vote now.</gray>
    cancel:
      name: <color:#ff758f>Cancel</color>
      lore: <gray>Go back without voting.</gray>
    unknown_name: Unknown
  vote_perk_sort:
    title: <light_purple>Perk Sort</light_purple>
    title_section: <light_purple>Perk Sort</light_purple> <gray>(%section%)</gray>
    header:
      name: <light_purple>Perk sort</light_purple>
      lore:
        mode: <light_purple>Perk sort</light_purple>
        non_strict: <dark_gray>Non-strict:</dark_gray> <gray>shows candidates with any selected perks.</gray>
        page: <light_purple>Perk sort</light_purple>
        selected: <gray>Selected:</gray> <white>%count%</white>
        strict: <dark_gray>Strict:</dark_gray> <gray>candidate perks must be within your selection.</gray>
    strict:
      name: <color:#c77dff>Strict mode</color>
      lore:
        status: <gray>Status:</gray> <white>%state%</white>
        toggle: <dark_gray>Click to toggle.</dark_gray>
    perk:
      lore:
        section: <gray>Section:</gray> <white>%section%</white>
        select: <gray>Click to select</gray>
        selected: <color:#c77dff>Selected</color>
    prev_section:
      name: <gray> Prev section</gray>
      lore: <gray>Section:</gray> <white>%section%</white>
    next_section:
      name: <gray>Next section </gray>
      lore: <gray>Section:</gray> <white>%section%</white>
    clear:
      name: <color:#ff758f>Clear selection</color>
      lore: <gray>Remove all selected perks.</gray>
    back:
      lore: <dark_gray>Return to vote menu.</dark_gray>
  apply_sections:
    title: <gradient:#0f0b17:#7b2cbf> Apply</gradient> <gray> Sections</gray>
    header:
      name: <gradient:#3c096c:#9d4edd>Choose your blessings</gradient>
      lore:
        allowed: <gray>Perks allowed:</gray> <white>%allowed%</white>
        hint: <dark_gray>Youll confirm + pay on the last page.</dark_gray>
        selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
        term: <gray>Term:</gray> <white>#%term%</white>
    section_open:
      lore:
        click: <gray>Click to browse perks.</gray>
        section: <dark_gray>Section:</dark_gray> <white>%section%</white>
    section_locked:
      name: '%display% <color:#ff758f>(LOCKED)</color>'
      lore:
        reason: <gray>%reason%</gray>
    custom_open:
      name: <gradient:#3c096c:#9d4edd> Custom Perks</gradient>
      lore:
        '1': <gray>Your approved custom perks.</gray>
        '2': <dark_gray>(Admins must approve before you can pick them.)</dark_gray>
    custom_closed:
      name: <gray> Custom Perks</gray>
      lore:
        '1': <dark_gray>No approved custom perks yet.</dark_gray>
        '2': <gray>Request one from:</gray> <white>Claimant Hub or Custom Perks</white>
    next:
      name: <color:#c77dff>Next</color>
      lore:
        cost: <gray>Cost:</gray> <gradient:#3c096c:#9d4edd>%cost%</gradient>
        hint: <dark_gray>Confirm & pay on the next page.</dark_gray>
        selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
    already_applied:
      name: <color:#c77dff>You already applied</color>
      lore:
        term: <gray>Your perks are locked for term:</gray> <white>#%term%</white>
        view: <gray>Click to view your application.</gray>
    reapply_stepdown:
      lore:
        '1': <gray>Re-applying after step down</gray>
        '2': <gray>is disabled for this term.</gray>
    reapply_removed:
      lore:
        '1': <gray>You were removed from this election</gray>
        '2': <gray>and cannot re-apply this term.</gray>
    reapply_denied:
      name: <color:#ff758f>Cannot re-apply</color>
    playtime:
      name: <color:#ff758f>Not enough playtime</color>
      lore:
        required: <gray>You need:</gray> <white>%minutes% minutes</white>
        retry: <gray>Keep playing and try again!</gray>
    closed:
      name: <color:#ff758f>Applications are closed</color>
      lore: <gray>Come back during the vote window.</gray>
    no_sections:
      name: <color:#ff758f>No perk sections configured</color>
      lore:
        '1': <gray>Check perks.sections in config.yml.</gray>
        '2': <gray>Reload the plugin after edits.</gray>
    unavailable:
      name: <color:#ff758f>Applications unavailable</color>
      lore: <gray>Unpause or re-enable the system to continue.</gray>
    back:
      lore: <dark_gray>Return to the main menu.</dark_gray>
  apply_perks:
    title: <gradient:#0f0b17:#7b2cbf> Apply</gradient> <gray> Perks</gray>
    header:
      name: <light_purple>Selected:</light_purple> <white>%selected%/%allowed%</white>
      lore:
        section: <dark_gray>Section:</dark_gray> <white>%section%</white>
        section_limit: <gray>Section limit:</gray> <white>%selected%/%limit%</white>
    perk:
      progress: <dark_gray>Selected:</dark_gray> <white>%selected%/%allowed%</white>
      selected_prefix: '<color:#c77dff>[Selected]</color> '
      toggle_remove: <gray>Click to remove.</gray>
      toggle_select: <gray>Click to select.</gray>
      unselected_prefix: '<gray>[Open]</gray> '
    custom:
      item:
        name: <gradient:#3c096c:#9d4edd>%title%</gradient>
        lore:
          description: <dark_gray>%description%</dark_gray>
          id: <gray>Custom perk request</gray> <color:#c77dff>#%id%</color>
    next:
      name: <color:#c77dff>Next</color>
      lore:
        '1': <gray>Go to confirmation.</gray>
        '2': <dark_gray>Youll confirm & pay on the next page.</dark_gray>
    section_unavailable:
      name: <color:#ff758f>Section unavailable</color>
      lore: <gray>%reason%</gray>
    empty:
      name: <color:#ff758f>No perks found</color>
      lore: <gray>%reason%</gray>
      default_reason: This section has no enabled perks.
    closed:
      name: <color:#ff758f>Applications are closed</color>
    unavailable:
      name: <color:#ff758f>Applications unavailable</color>
      default_reason: Section unavailable.
    back:
      lore: <dark_gray>Return to section list.</dark_gray>
  apply_confirm:
    title: <gradient:#0f0b17:#7b2cbf> Apply</gradient> <gray> Confirm</gray>
    summary:
      name: <gradient:#3c096c:#9d4edd>Review your application</gradient>
      cost: <gray>Cost:</gray> <gradient:#3c096c:#9d4edd>%cost%</gradient>
      locked_hint: <dark_gray>After confirming, perks are permanently locked for this election.</dark_gray>
      more: <dark_gray>+%count% more</dark_gray>
      none: <color:#ff758f>No perks selected yet.</color>
      none_hint: <gray>Go back and pick your perks.</gray>
      perk_entry: <gray>-</gray> %perk%
      perks_header: <gray>Your perks:</gray>
      selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
      term: <gray>Term:</gray> <white>#%term%</white>
    confirm:
      name: <color:#c77dff>Confirm</color>
      lore:
        charge: <gray>-</gray> <white>Charge</white> <gradient:#3c096c:#9d4edd>%cost%</gradient>
        header: <gray>This will:</gray>
        hint: <color:#c77dff>Make sure you're happy with your picks.</color>
        lock: <gray>-</gray> <white>Lock your perks</white>
        register: <gray>-</gray> <white>Register you as a candidate</white>
    cancel:
      name: <color:#ff758f>Cancel</color>
      lore: <gray>Stops the apply wizard.</gray>
    closed:
      name: <color:#ff758f>Applications are closed</color>
    unavailable:
      name: <color:#ff758f>Applications unavailable</color>
    back:
      lore: <gray>Adjust your perks.</gray>
  candidate:
    title: <gradient:#240046:#c77dff> Claimant Hub</gradient>
    profile:
      name: <gradient:#3c096c:#9d4edd>%player%</gradient>
      lore:
        apply_hint: <color:#c77dff>Click to apply.</color>
        election_closed: <color:#ff758f>Crown Vote closed.</color>
        perks: <gray>Perks picked:</gray> <white>%selected%/%allowed%</white>
        pick_hint: <dark_gray>Click to pick perks.</dark_gray>
        status: <gray>Status:</gray> %status%
        term: <gray>Crown Vote term:</gray> <white>#%term%</white>
        votes: <gray>Oaths:</gray> <white>%votes%</white>
    role:
      candidate: <color:#c77dff>Claimant</color>
      mayor: <gradient:#3c096c:#9d4edd>%title_name%</gradient>
      not_candidate: <color:#ff758f>Not a candidate</color>
      peasant: <gray>Peasant</gray>
    bio:
      name: <gradient:#3c096c:#9d4edd> Bio / Profile</gradient>
      lore:
        edit: <dark_gray>Click to edit.</dark_gray>
        empty:
          '1': <gray>No bio set.</gray>
          '2': <dark_gray>Click to write one.</dark_gray>
        more: <dark_gray>+ more</dark_gray>
        not_candidate:
          '1': <gray>Set a short bio that voters see.</gray>
          '2': <dark_gray>(Apply first.)</dark_gray>
        preview: <gray>Preview:</gray>
        preview_line: <white>%line%</white>
    checklist:
      name: <color:#c77dff>Checklist</color>
      application_done: <color:#c77dff></color> <gray>Application confirmed</gray>
      application_pending: <color:#c77dff></color> <gray>Application not confirmed yet</gray>
      apply_hint: <color:#c77dff>Apply to join the election.</color>
      bio_done: <color:#c77dff></color> <gray>Bio set</gray>
      bio_missing: <color:#c77dff></color> <gray>Bio not set</gray>
      closed: <color:#ff758f>Crown Vote is closed.</color>
      not_applied: <gray>Not applied yet.</gray>
      perks_done: <color:#c77dff></color> <gray>Perks chosen:</gray> <white>%selected%/%allowed%</white>
      perks_missing: <color:#c77dff></color> <gray>Pick</gray> <white>%missing%</white> <gray>more perk(s)</gray>
      requests_pending: <color:#c77dff></color> <gray>Custom requests pending:</gray> <white>%count%</white>
    preview:
      name: <light_purple>Preview Claimant View</light_purple>
      lore:
        '1': <gray>See your perks + bio as voters see them.</gray>
        not_candidate: <dark_gray>(Apply first.)</dark_gray>
        read_only: <dark_gray>Read-only preview.</dark_gray>
    custom:
      name: <gradient:#3c096c:#9d4edd>Custom Perks</gradient>
      lore:
        '1': <gray>Request custom perks here.</gray>
        '2': <dark_gray>Admins must approve first.</dark_gray>
    step_down:
      name: <color:#ff758f>Step Down</color>
      lore:
        '1': <gray>Step down from the current race.</gray>
        confirm: <dark_gray>Click to confirm.</dark_gray>
        election_closed: <dark_gray>Crown Vote is closed.</dark_gray>
        mayor_can_stepdown: <color:#c77dff>%title_name% may step down to open elections.</color>
        no_refund: <color:#ff758f>You won't get your money back.</color>
        not_in_race: <dark_gray>Not currently in the race.</dark_gray>
        policy_off: <dark_gray>Step down is disabled.</dark_gray>
    no_permission:
      name: <color:#ff758f>No permission</color>
      lore: <gray>You do not have permission to access the candidate menu.</gray>
  candidate_custom:
    title: <gradient:#3c096c:#9d4edd> Custom Perks</gradient>
    header:
      name: <gradient:#3c096c:#9d4edd>How it works</gradient>
      lore:
        '1': <gray>Submit requests for admins to review.</gray>
        '2': <gray>Approved requests become selectable perks.</gray>
        chosen: <gray>Chosen perks:</gray> <white>%chosen%/%allowed%</white>
        locked:
          '1': <color:#ff758f>Locked:</color> <gray>You already confirmed your application.</gray>
          '2': <gray>You can still request perks, but you can't select them now.</gray>
        not_candidate: <gray>Not a candidate:</gray> <white>apply to select perks.</white>
        requests: <gray>Requests:</gray> <white>%used%/%limit%</white>
    conditions:
      disabled: <color:#ff758f>Disabled by admin</color>
      elected_once_fail: <color:#ff758f>Must have been elected mayor at least once</color>
      elected_once_ok: <color:#c77dff>Requirement met</color>
      no_playtime: <color:#c77dff>No playtime requirement</color>
      none: <color:#c77dff>No restriction</color>
      playtime_fail: <color:#ff758f>Requires %minutes% minutes playtime</color>
      playtime_ok: <color:#c77dff>Playtime requirement met</color>
    request:
      name: <color:#c77dff>#%id%</color> <white>%title%</white>
      lore:
        apply_first: <gray>Apply to select perks.</gray>
        description: <gray>%description%</gray>
        limit_hint: <dark_gray>Counts toward your perks-per-term limit.</dark_gray>
        locked: <color:#ff758f>Locked</color> <gray>(cannot select/remove now)</gray>
        not_selectable: <dark_gray>Not selectable until approved.</dark_gray>
        perk_id: <gray>Perk ID:</gray> <white>%perk_id%</white>
        status: <gray>Status:</gray> <white>%status%</white>
        toggle_remove: <gray>Click to remove.</gray>
        toggle_select: <gray>Click to select.</gray>
      selected_prefix: '<color:#c77dff>[Selected]</color> '
    submit:
      lore:
        cancel_hint: <dark_gray>Type 'cancel' to stop.</dark_gray>
        condition_fail: <gray>You don't meet the requirement to request custom perks.</gray>
        election_closed: <gray>Requests are only accepted while elections are open.</gray>
        limit: <color:#ff758f>Limit reached:</color> <gray>%used%/%limit% requests used.</gray>
        must_be_candidate: <gray>You must be an active candidate to submit requests.</gray>
        prompt: <gray>Click, then type Title and Description in chat.</gray>
        requirement: <gray>Requirement:</gray> %status%
      name_disabled: <color:#ff758f>Cannot submit</color>
      name_enabled: <color:#c77dff>+ Submit request</color>
    unavailable:
      name: <color:#ff758f>Custom perks unavailable</color>
  candidate_perk_catalog:
    title: <gradient:#240046:#e0aaff> Perks</gradient>
    header:
      name: <gradient:#3c096c:#9d4edd>Blessing Archive</gradient>
      lore:
        click: <gray>Click a section to view perks.</gray>
        read_only: <dark_gray>(read-only)</dark_gray>
        selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
    section:
      lore: <gray>Click to view perks.</gray>
    empty:
      name: <color:#ff758f>No perk sections configured</color>
      lore: <gray>Ask an admin to configure perks.sections.</gray>
  candidate_perk_section:
    title: <gradient:#240046:#e0aaff> Perks</gradient> <gray> %section%</gray>
    header:
      name: <gradient:#3c096c:#9d4edd>%section%</gradient>
      lore:
        read_only: <dark_gray>(read-only)</dark_gray>
        selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
    perk:
      selected_prefix: '<color:#c77dff>[Selected]</color> '
      state_selected: <dark_gray>This perk is selected.</dark_gray>
      state_unselected: <dark_gray>This perk is not selected.</dark_gray>
      unselected_prefix: '<gray>[View]</gray> '
    empty:
      name: <color:#ff758f>No perks</color>
      lore: <gray>%reason%</gray>

menus:
  main:
    title: <gradient:#00c6ff:#0072ff>🏛 %title_name%</gradient> <gray>Menu</gray>
    header:
      name: <gold>🏛 %title_name% System</gold>
      lore:
        click_view: <gray>Click to view:</gray> <white>Status & Timeline</white>
        current_term_active: <gray>Current term:</gray> <white>#%term%</white>
        current_term_not_started: <gray>Current term:</gray> <white>Not started</white>
        election_closed: <red>Election is CLOSED</red>
        election_open: <green>Election is OPEN</green>
        hint: <dark_gray>Use the buttons below.</dark_gray>
        mayor: <gray>%title_name%:</gray> <white>%mayor%</white>
    vote:
      name: <aqua>🗳 Vote</aqua>
      lore:
        closed: <red>Voting is CLOSED</red>
        open: <green>Voting is OPEN</green>
        pick: <gray>Pick a candidate.</gray>
    apply:
      name: <yellow>📜 Apply</yellow>
      lore: <gray>Run for the next term.</gray>
    candidate:
      name: <gradient:#ff512f:#dd2476>👑 Candidate</gradient>
      lore:
        apply_hint: <gray>Open to apply and manage perks.</gray>
        ask_admin: <gray>Ask an admin for access.</gray>
        no_permission: <red>No permission</red>
        not_applied: <red>Not applied yet.</red>
        open: <gray>Open your candidate dashboard.</gray>
        term: '<dark_gray>Term #%term%</dark_gray>'
    staff:
      name: <red>🛡 Staff Panel</red>
      lore: <gray>Staff tools.</gray>
  status:
    title: <gradient:#00c6ff:#0072ff>✨ %title_name% Status</gradient>
    timeline:
      name: <gold>🧭 Timeline</gold>
      lore:
        next_term: <gray>Next term:</gray> <white>#%term%</white>
        no_override: <dark_gray>(no overrides)</dark_gray>
        override: <yellow>Admin override:</yellow> <white>%state%</white>
        term_start: <gray>Next term starts:</gray> <white>%time%</white>
        voting_close: <gray>Voting closes:</gray> <white>%time%</white>
        voting_open: <gray>Voting opens:</gray> <white>%time%</white>
      not_started: Not started
    current_mayor:
      name: <gradient:#f7971e:#ffd200>👑 Current %title_name%</gradient>
      lore:
        name: <gray>Name:</gray> <white>%name%</white>
        active_perks: <gray>Active perks:</gray>
        more: <dark_gray>+%count% more…</dark_gray>
        none: <dark_gray>No perks selected (or no mayor yet).</dark_gray>
        perk_entry: <gray>•</gray> %perk%
    election:
      name: <gradient:#00d2ff:#3a7bd5>🗳 Election</gradient>
      lore:
        closed: <gray>Election is not open right now.</gray>
        closed_hint: <dark_gray>Come back during the vote window.</dark_gray>
        live: <gray>Election is LIVE for term:</gray> <white>#%term%</white>
        no_candidates: <gray>No candidates yet.</gray>
        top_hint: <dark_gray>(top 3 by votes)</dark_gray>
    none: None
  vote:
    title: <gradient:#a1ffce:#faffd1>🗳 Vote</gradient>
    title_page: <gradient:#a1ffce:#faffd1>Vote</gradient> <gray>(Page %page%/%total_pages%)</gray>
    header:
      name: <gold>Vote</gold>
      lore:
        closes: <gray>Voting closes:</gray> <white>%time%</white>
        page: <gray>Page:</gray> <white>%page%/%total_pages%</white>
        perk_sort_none: <gray>Perk sort:</gray> <dark_gray>no perks selected</dark_gray>
        search: <gray>Search:</gray> <white>%filter%</white>
        sort: <gray>Sort:</gray> <white>%sort%</white>
        status: <gray>Status:</gray> %status%
        term: <gray>Term:</gray> <white>#%term%</white>
        time_left: <gray>Time left:</gray> <white>%time%</white>
        voted_for: <gray>You voted for:</gray> <gold>%name%</gold>
    candidate:
      name:
        active: <aqua><bold>%name%</bold></aqua>
        inactive: <yellow>%name%</yellow>
      lore:
        bio: <gray>Bio:</gray> <white>%bio%</white>
        click_vote: <green>Click to vote</green>
        match: <gray>Match:</gray> <white>%match%/%total%</white>
        not_eligible: <gray>Not eligible to vote</gray>
        perk_more: <dark_gray>+%count% more</dark_gray>
        perk_preview: <dark_gray></dark_gray> %perk%
        perks: <gray>Perks:</gray> <white>%count%</white>
        status: <gray>Status:</gray> %status% <dark_gray></dark_gray> %online%
      online:
        offline: <dark_gray>Offline</dark_gray>
        online: <green>Online</green>
      status:
        active: <green>Active</green>
        process: <gold>In process</gold>
        removed: <red>Removed</red>
    controls:
      clear_search:
        name: <red>Clear search</red>
        lore: <gray>Remove the name filter.</gray>
      next:
        name: <gray>Next </gray>
        lore:
          page: <gray>Page:</gray> <white>%page%/%total_pages%</white>
      perk_sort:
        name: <aqua>Perk sort</aqua>
        lore:
          '1': <gray>Pick perks to prioritize in sorting.</gray>
          configure: <dark_gray>Click to configure.</dark_gray>
          none: <dark_gray>No perks selected.</dark_gray>
          selected: <gray>Selected:</gray> <white>%count%</white>
      prev:
        name: <gray> Prev</gray>
        lore:
          page: <gray>Page:</gray> <white>%page%/%total_pages%</white>
      search:
        name: <aqua>Search</aqua>
        lore:
          current: <gray>Current:</gray> <white>%filter%</white>
          filter: <gray>Filter candidates by name.</gray>
          none: <dark_gray>(no active filter)</dark_gray>
          type: <dark_gray>Click to type.</dark_gray>
        prompt_title: <gold>Search candidates</gold>
      sort:
        name: <aqua>Sort</aqua>
        lore:
          alphabetical: <gray>•</gray> Alphabetical
          current: <gray>Current:</gray> <white>%sort%</white>
          cycle: <dark_gray>Click to cycle:</dark_gray>
          online_first: <gray>•</gray> Online first
          perk_match: <gray>•</gray> Perk match
    sort:
      alphabetical: Alphabetical
      online_first: Online first
      perk_match: Perk match
    state:
      closed: <red>CLOSED</red>
      open: <green>OPEN</green>
    perk_sort:
      mode_non_strict: Non-strict
      mode_strict: Strict
    receipt:
      name: '<gold>Voted: %name%</gold>'
      change_allowed: <gray>You can change your vote until the election closes.</gray>
      closed: <red>Voting is closed</red>
      locked: <gray>Your vote is locked for this term.</gray>
      view_perks: <dark_gray>Click to view perks.</dark_gray>
    unknown_name: Unknown
    unavailable:
      name: <red>Voting unavailable</red>
  vote_confirm:
    title: <gold>Confirm Vote</gold>
    head:
      name: <yellow>Vote for %name%?</yellow>
      lore:
        bio_header: <gray>Bio:</gray>
        perks_hint: <dark_gray>Click this head to view their perks.</dark_gray>
        status: <gray>Status:</gray> %status%
        term: <gray>Term:</gray> <white>#%term%</white>
        vote_change_no: <gray>Your vote is final for this term.</gray>
        vote_change_yes: <gray>You can change your vote until the election closes.</gray>
    status:
      active: <green>ACTIVE</green>
      process: <gold>PROCESS</gold>
      removed: <red>REMOVED</red>
    bio:
      empty: <gray>No candidate bio.</gray>
      line: <gray>%line%</gray>
    confirm:
      name: <green>Confirm</green>
      lore: <gray>Cast your vote now.</gray>
    cancel:
      name: <red>Cancel</red>
      lore: <gray>Go back without voting.</gray>
    unknown_name: Unknown
  vote_perk_sort:
    title: <aqua>Perk Sort</aqua>
    title_section: <aqua>Perk Sort</aqua> <gray>(%section%)</gray>
    header:
      name: <aqua>Perk sort</aqua>
      lore:
        mode: <aqua>Perk sort</aqua>
        non_strict: <dark_gray>Non-strict:</dark_gray> <gray>shows candidates with any selected perks.</gray>
        page: <aqua>Perk sort</aqua>
        selected: <gray>Selected:</gray> <white>%count%</white>
        strict: <dark_gray>Strict:</dark_gray> <gray>candidate perks must be within your selection.</gray>
    strict:
      name: <yellow>Strict mode</yellow>
      lore:
        status: <gray>Status:</gray> <white>%state%</white>
        toggle: <dark_gray>Click to toggle.</dark_gray>
    perk:
      lore:
        section: <gray>Section:</gray> <white>%section%</white>
        select: <gray>Click to select</gray>
        selected: <green>Selected</green>
    prev_section:
      name: <gray> Prev section</gray>
      lore: <gray>Section:</gray> <white>%section%</white>
    next_section:
      name: <gray>Next section </gray>
      lore: <gray>Section:</gray> <white>%section%</white>
    clear:
      name: <red>Clear selection</red>
      lore: <gray>Remove all selected perks.</gray>
    back:
      lore: <dark_gray>Return to vote menu.</dark_gray>
  apply_sections:
    title: <gradient:#00c6ff:#0072ff>📜 Apply</gradient> <gray>• Sections</gray>
    header:
      name: <gold>Pick your perks</gold>
      lore:
        allowed: <gray>Perks allowed:</gray> <white>%allowed%</white>
        hint: <dark_gray>You’ll confirm + pay on the last page.</dark_gray>
        term: <gray>Term:</gray> <white>#%term%</white>
    section_open:
      lore:
        click: <gray>Click to browse perks.</gray>
        section: <dark_gray>Section:</dark_gray> <white>%section%</white>
    section_locked:
      name: '%display% <red>(LOCKED)</red>'
      lore:
        reason: <gray>%reason%</gray>
    custom_open:
      name: <gradient:#f7971e:#ffd200>🛠 Custom Perks</gradient>
      lore:
        '1': <gray>Your approved custom perks.</gray>
        '2': <dark_gray>(Admins must approve before you can pick them.)</dark_gray>
    custom_closed:
      name: <gray>🛠 Custom Perks</gray>
      lore:
        '1': <dark_gray>No approved custom perks yet.</dark_gray>
        '2': <gray>Request one from:</gray> <white>Candidate → Custom Perks</white>
    next:
      name: <green>Next</green>
      lore:
        cost: <gray>Cost:</gray> <gold>%cost%</gold>
        hint: <dark_gray>Confirm & pay on the next page.</dark_gray>
    already_applied:
      name: <yellow>You already applied</yellow>
      lore:
        term: <gray>Your perks are locked for term:</gray> <white>#%term%</white>
        view: <gray>Click to view your application.</gray>
    reapply_stepdown:
      lore:
        '1': <gray>Re-applying after step down</gray>
        '2': <gray>is disabled for this term.</gray>
    reapply_removed:
      lore:
        '1': <gray>You were removed from this election</gray>
        '2': <gray>and cannot re-apply this term.</gray>
    reapply_denied:
      name: <red>Cannot re-apply</red>
    playtime:
      name: <red>Not enough playtime</red>
      lore:
        required: <gray>You need:</gray> <white>%minutes% minutes</white>
        retry: <gray>Keep playing and try again!</gray>
    closed:
      name: <red>Applications are closed</red>
      lore: <gray>Come back during the vote window.</gray>
    no_sections:
      name: <red>No perk sections configured</red>
      lore:
        '1': <gray>Check perks.sections in config.yml.</gray>
        '2': <gray>Reload the plugin after edits.</gray>
    unavailable:
      name: <red>Applications unavailable</red>
      lore: <gray>Unpause or re-enable the system to continue.</gray>
    back:
      lore: <dark_gray>Return to the main menu.</dark_gray>
  apply_perks:
    title: <gradient:#00c6ff:#0072ff>📜 Apply</gradient> <gray>• Perks</gray>
    header:
      name: <light_purple>Selected:</light_purple> <white>%selected%/%allowed%</white>
      lore:
        section: <dark_gray>Section:</dark_gray> <white>%section%</white>
    perk:
      progress: <dark_gray>Selected:</dark_gray> <white>%selected%/%allowed%</white>
      selected_prefix: '<green>✓</green> '
      toggle_remove: <gray>Click to remove.</gray>
      toggle_select: <gray>Click to select.</gray>
      unselected_prefix: '<gray>+</gray> '
    custom:
      item:
        name: <gold>%title%</gold>
        lore:
          description: <dark_gray>%description%</dark_gray>
          id: <gray>Custom perk request</gray> <yellow>#%id%</yellow>
    next:
      name: <green>Next</green>
      lore:
        '1': <gray>Go to confirmation.</gray>
        '2': <dark_gray>You’ll confirm & pay on the next page.</dark_gray>
    section_unavailable:
      name: <red>Section unavailable</red>
      lore: <gray>%reason%</gray>
    empty:
      name: <red>No perks found</red>
      lore: <gray>%reason%</gray>
      default_reason: This section has no enabled perks.
    closed:
      name: <red>Applications are closed</red>
    unavailable:
      name: <red>Applications unavailable</red>
      default_reason: Section unavailable.
    back:
      lore: <dark_gray>Return to section list.</dark_gray>
  apply_confirm:
    title: <gradient:#00c6ff:#0072ff>📜 Apply</gradient> <gray>• Confirm</gray>
    summary:
      name: <gold>Review your application</gold>
      cost: <gray>Cost:</gray> <gold>%cost%</gold>
      locked_hint: <dark_gray>After confirming, perks are permanently locked for this election.</dark_gray>
      more: <dark_gray>+%count% more…</dark_gray>
      none: <red>No perks selected yet.</red>
      none_hint: <gray>Go back and pick your perks.</gray>
      perk_entry: <gray>•</gray> %perk%
      perks_header: <gray>Your perks:</gray>
      term: <gray>Term:</gray> <white>#%term%</white>
    confirm:
      name: <green>Confirm</green>
      lore:
        charge: <gray>•</gray> <white>Charge</white> <gold>%cost%</gold>
        header: <gray>This will:</gray>
        hint: <yellow>Make sure you're happy with your picks.</yellow>
        lock: <gray>•</gray> <white>Lock your perks</white>
        register: <gray>•</gray> <white>Register you as a candidate</white>
    cancel:
      name: <red>Cancel</red>
      lore: <gray>Stops the apply wizard.</gray>
    closed:
      name: <red>Applications are closed</red>
    unavailable:
      name: <red>Applications unavailable</red>
    back:
      lore: <gray>Adjust your perks.</gray>
  candidate:
    title: <gradient:#ff512f:#dd2476>👑 Candidate Hub</gradient>
    profile:
      name: <gold>%player%</gold>
      lore:
        apply_hint: <green>Click to apply.</green>
        election_closed: <red>Election closed.</red>
        perks: <gray>Perks picked:</gray> <white>%selected%/%allowed%</white>
        pick_hint: <dark_gray>Click to pick perks.</dark_gray>
        status: <gray>Status:</gray> %status%
        term: <gray>Election term:</gray> <white>#%term%</white>
        votes: <gray>Votes:</gray> <white>%votes%</white>
    role:
      candidate: <green>Candidate</green>
      mayor: <gold>%title_name%</gold>
      not_candidate: <red>Not a candidate</red>
      peasant: <gray>Peasant</gray>
    bio:
      name: <gold>✍ Bio / Profile</gold>
      lore:
        edit: <dark_gray>Click to edit.</dark_gray>
        empty:
          '1': <gray>No bio set.</gray>
          '2': <dark_gray>Click to write one.</dark_gray>
        more: <dark_gray>+ more…</dark_gray>
        not_candidate:
          '1': <gray>Set a short bio that voters see.</gray>
          '2': <dark_gray>(Apply first.)</dark_gray>
        preview: <gray>Preview:</gray>
        preview_line: <white>%line%</white>
    checklist:
      name: <yellow>Checklist</yellow>
      application_done: <green>✔</green> <gray>Application confirmed</gray>
      application_pending: <yellow>⚠</yellow> <gray>Application not confirmed yet</gray>
      apply_hint: <green>Apply to join the election.</green>
      bio_done: <green>✔</green> <gray>Bio set</gray>
      bio_missing: <yellow>⚠</yellow> <gray>Bio not set</gray>
      closed: <red>Election is closed.</red>
      not_applied: <gray>Not applied yet.</gray>
      perks_done: <green>✔</green> <gray>Perks chosen:</gray> <white>%selected%/%allowed%</white>
      perks_missing: <yellow>⚠</yellow> <gray>Pick</gray> <white>%missing%</white> <gray>more perk(s)</gray>
      requests_pending: <yellow>⚠</yellow> <gray>Custom requests pending:</gray> <white>%count%</white>
    preview:
      name: <aqua>Preview Voter View</aqua>
      lore:
        '1': <gray>See your perks + bio as voters see them.</gray>
        not_candidate: <dark_gray>(Apply first.)</dark_gray>
        read_only: <dark_gray>Read-only preview.</dark_gray>
    custom:
      name: <gold>Custom Perks</gold>
      lore:
        '1': <gray>Request custom perks here.</gray>
        '2': <dark_gray>Admins must approve first.</dark_gray>
    step_down:
      name: <red>Step Down</red>
      lore:
        '1': <gray>Step down from the current race.</gray>
        confirm: <dark_gray>Click to confirm.</dark_gray>
        election_closed: <dark_gray>Election is closed.</dark_gray>
        mayor_can_stepdown: <green>%title_name% may step down to open elections.</green>
        no_refund: <red>You won't get your money back.</red>
        not_in_race: <dark_gray>Not currently in the race.</dark_gray>
        policy_off: <dark_gray>Step down is disabled.</dark_gray>
    no_permission:
      name: <red>No permission</red>
      lore: <gray>You do not have permission to access the candidate menu.</gray>
  candidate_custom:
    title: <gradient:#f7971e:#ffd200>🛠 Custom Perks</gradient>
    header:
      name: <gold>How it works</gold>
      lore:
        '1': <gray>Submit requests for admins to review.</gray>
        '2': <gray>Approved requests become selectable perks.</gray>
        locked:
          '1': <red>Locked:</red> <gray>You already confirmed your application.</gray>
          '2': <gray>You can still request perks, but you can't select them now.</gray>
        not_candidate: <gray>Not a candidate:</gray> <white>apply to select perks.</white>
    conditions:
      disabled: <red>Disabled by admin</red>
      elected_once_fail: <red>Must have been elected mayor at least once</red>
      elected_once_ok: <green>Requirement met</green>
      no_playtime: <green>No playtime requirement</green>
      none: <green>No restriction</green>
      playtime_fail: <red>Requires %minutes% minutes playtime</red>
      playtime_ok: <green>Playtime requirement met</green>
    request:
      name: <yellow>#%id%</yellow> <white>%title%</white>
      lore:
        apply_first: <gray>Apply to select perks.</gray>
        description: <gray>%description%</gray>
        limit_hint: <dark_gray>Counts toward your perks-per-term limit.</dark_gray>
        locked: <red>Locked</red> <gray>(cannot select/remove now)</gray>
        not_selectable: <dark_gray>Not selectable until approved.</dark_gray>
        perk_id: <gray>Perk ID:</gray> <white>%perk_id%</white>
        status: <gray>Status:</gray> <white>%status%</white>
        toggle_remove: <gray>Click to remove.</gray>
        toggle_select: <gray>Click to select.</gray>
      selected_prefix: '<green>✓</green> '
    submit:
      lore:
        cancel_hint: <dark_gray>Type 'cancel' to stop.</dark_gray>
        condition_fail: <gray>You don't meet the requirement to request custom perks.</gray>
        election_closed: <gray>Requests are only accepted while elections are open.</gray>
        limit: <red>Limit reached:</red> <gray>%used%/%limit% requests used.</gray>
        must_be_candidate: <gray>You must be an active candidate to submit requests.</gray>
        prompt: <gray>Click, then type Title and Description in chat.</gray>
        requirement: <gray>Requirement:</gray> %status%
      name_disabled: <red>Cannot submit</red>
      name_enabled: <green>+ Submit request</green>
    unavailable:
      name: <red>Custom perks unavailable</red>
  candidate_perk_catalog:
    title: <gradient:#56ab2f:#a8e063>✨ Perks</gradient>
    header:
      name: <gold>Perk Catalog</gold>
      lore:
        click: <gray>Click a section to view perks.</gray>
        read_only: <dark_gray>(read-only)</dark_gray>
        selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
    section:
      lore: <gray>Click to view perks.</gray>
    empty:
      name: <red>No perk sections configured</red>
      lore: <gray>Ask an admin to configure perks.sections.</gray>
  candidate_perk_section:
    title: <gradient:#56ab2f:#a8e063>✨ Perks</gradient> <gray>• %section%</gray>
    header:
      name: <gold>%section%</gold>
      lore:
        read_only: <dark_gray>(read-only)</dark_gray>
        selected: <gray>Selected:</gray> <white>%selected%/%allowed%</white>
    perk:
      selected_prefix: '<green>✓</green> '
      state_selected: <dark_gray>This perk is selected.</dark_gray>
      state_unselected: <dark_gray>This perk is not selected.</dark_gray>
      unselected_prefix: '<gray>•</gray> '
    empty:
      name: <red>No perks</red>
      lore: <gray>%reason%</gray>
      default_reason: No enabled perks in this section.
    unavailable:
      name: <red>Section unavailable</red>
      lore: <gray>%reason%</gray>
      default_reason: Section unavailable.
  candidate_perks_view:
    default_candidate: Candidate
    head:
      name: <yellow>%name%</yellow>
      lore:
        bio_header: <gold>Bio</gold>
        online: <gray>Online:</gray> <white>%online%</white>
        perks: <gray>Perks:</gray> <white>%count%</white>
        status: <gray>Status:</gray> %status%
        term: <gray>Term:</gray> <white>#%term%</white>
        votes: <gray>Votes:</gray> <white>%votes%</white>
    status:
      active: <green>ACTIVE</green>
      process: <gold>PROCESS</gold>
      removed: <red>REMOVED</red>
    bio:
      empty: <gray>No bio set.</gray>
      line: <gray>%line%</gray>
      more: <dark_gray>+ more…</dark_gray>
    prev:
      name: <gray>◀ Prev</gray>
      lore:
        hint: <gray>Click to view previous perks.</gray>
        page: <dark_gray>Page %page% / %total%</dark_gray>
    next:
      name: <gray>Next ▶</gray>
      lore:
        hint: <gray>Click to view more perks.</gray>
        page: <dark_gray>Page %page% / %total%</dark_gray>
    back_confirm:
      lore: <dark_gray>Back to confirm</dark_gray>
    unknown_name: Unknown
    unknown_perk:
      name: <red>Unknown perk</red>
      lore:
        id: <dark_gray>%id%</dark_gray>
        reason: <gray>This perk no longer exists in config, or was disabled.</gray>
  mayor_profile:
    default_name: Profile
    head:
      name: <gold>%title_name%</gold> <yellow>%name%</yellow>
      lore:
        bio_header: <gold>Bio</gold>
        votes: <gray>Votes:</gray> <white>%votes%</white>
    bio:
      empty: <gray>No bio set.</gray>
      line: <gray>%line%</gray>
      more: <dark_gray>+ more…</dark_gray>
    prev:
      name: <gray>◀ Prev</gray>
      lore:
        hint: <gray>Click to view previous perks.</gray>
        page: <dark_gray>Page %page% / %total%</dark_gray>
    next:
      name: <gray>Next ▶</gray>
      lore:
        hint: <gray>Click to view more perks.</gray>
        page: <dark_gray>Page %page% / %total%</dark_gray>
    unknown_name: Unknown
    unknown_perk:
      name: <red>Unknown perk</red>
      lore:
        id: <dark_gray>%id%</dark_gray>
        reason: <gray>This perk no longer exists in config, or was disabled.</gray>

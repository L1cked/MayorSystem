name: MayorSystem
version: ${version}
main: mayorSystem.MayorPlugin
api-version: '1.21'
description: Elections + Mayor perks for Paper 1.21.8
softdepend:
  - Vault
  - Citizens
  - FancyNpcs
  - FancyNPCs
  - ShopGUIPlus
  - EconomyShopGUI
  - EconomyShopGUI-Premium
  - PlaceholderAPI

permissions:
  mayor.use:
    description: Access the /mayor menu
    default: true
  mayor.apply:
    description: Apply to be a mayor candidate
    default: true
  mayor.vote:
    description: Vote in elections
    default: true
  mayor.candidate:
    description: Candidate actions (perk selection, custom requests)
    default: true

  # ---------------------------------------------------------------------------
  # Admin permissions (organized by section)
  # Command convention: /mayor admin <section> <action> ...
  # Permission convention: mayor.admin.<section>.<action>
  # ---------------------------------------------------------------------------

  # Root staff access. This is granted as a child of any admin action permission.
  mayor.admin.access:
    description: Access to MayorSystem admin tools (root)
    default: op
    children:
      mayor.admin.panel.open: true

  # Panel
  mayor.admin.panel.open:
    description: Open the admin panel (/mayor admin)
    default: op

  # System
  mayor.admin.system.toggle:
    description: Toggle public access (/mayor admin system toggle)
    default: op
    children:
      mayor.admin.access: true

  # Candidates
  mayor.admin.candidates.remove:
    description: Remove a candidate from the current election
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.candidates.restore:
    description: Restore a removed candidate
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.candidates.process:
    description: Mark a candidate as in-process
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.candidates.applyban:
    description: Manage apply bans (perm/temp/clear)
    default: op
    children:
      mayor.admin.access: true

  # Perks
  mayor.admin.perks.refresh:
    description: Refresh active perk potion effects (all or one player)
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.perks.requests:
    description: Approve/deny custom perk requests
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.perks.catalog:
    description: Toggle perk sections/perks availability
    default: op
    children:
      mayor.admin.access: true

  # Governance
  mayor.admin.governance.edit:
    description: Modify governance policies (tie-breaker, step-down, bonus terms)
    default: op
    children:
      mayor.admin.access: true

  # Messaging
  mayor.admin.messaging.edit:
    description: Edit messaging settings (chat prompts, broadcasts)
    default: op
    children:
      mayor.admin.access: true

  # Economy
  mayor.admin.economy.edit:
    description: Edit economy integration settings (sell bonuses)
    default: op
    children:
      mayor.admin.access: true

  # Election
  mayor.admin.election.start:
    description: Force-start the election now
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.election.end:
    description: Force-end the election now
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.election.clear:
    description: Clear admin overrides for the current election term
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.election.elect:
    description: Force-elect a player (set/clear/now)
    default: op
    children:
      mayor.admin.access: true

  # Settings
  mayor.admin.settings.edit:
    description: Edit settings via commands/menus
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.settings.reload:
    description: Reload config and elections store
    default: op
    children:
      mayor.admin.access: true

  # Maintenance
  mayor.admin.maintenance.reload:
    description: Reload config and elections store
    default: op
    children:
      mayor.admin.access: true
  mayor.admin.maintenance.debug:
    description: Access maintenance tools (offline cache, reset)
    default: op
    children:
      mayor.admin.access: true

  # Audit
  mayor.admin.audit.view:
    description: View/export the audit log
    default: op
    children:
      mayor.admin.access: true

  # Health
  mayor.admin.health.view:
    description: Run health checks
    default: op
    children:
      mayor.admin.access: true



  # Mayor NPC
  mayor.admin.npc.mayor:
    description: Spawn/remove/update the Mayor NPC statue
    default: op
    children:
      mayor.admin.access: true



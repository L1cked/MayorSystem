styles:
  normal: "<gradient:#f7971e:#ffd200><bold>"
  normal_end: "</bold></gradient>"
  warning: "<yellow>"
  warning_end: "</yellow>"
  error: "<red>"
  error_end: "</red>"
  disabled: "<red>"
  disabled_end: "</red>"
  blocked: "<red>"
  blocked_end: "</red>"
  success: "<green>"
  success_end: "</green>"
  info: "<gray>"
  info_end: "</gray>"
  accent: "<white>"
  accent_end: "</white>"

prefix: "%style_normal%%title_name%%style_normal_end% <dark_gray>>></dark_gray> "

npc:
  title: "<gold>%title_name%</gold>"
  no_mayor: "<gray>No %title_name_lower%</gray>"
  no_active_term: "<gray>No active term yet.</gray>"
  no_mayor_elected: "<gray>No %title_name_lower% has been elected yet.</gray>"

hologram:
  leaderboard:
    lines:
      - "<gold><bold>%title_name% Election Leaderboard</bold></gold>"
      - "<gray>Term #%mayorsystem_leaderboard_term%</gray>"
      - "<gray>Voting closes:</gray> <white>%mayorsystem_election_close%</white>"
      - ""
      - "%style_warning%#1%style_warning_end% %mayorsystem_leaderboard_1_name% <dark_gray>-</dark_gray> <gold>%mayorsystem_leaderboard_1_votes%</gold>"
      - "%style_warning%#2%style_warning_end% %mayorsystem_leaderboard_2_name% <dark_gray>-</dark_gray> <gold>%mayorsystem_leaderboard_2_votes%</gold>"
      - "%style_warning%#3%style_warning_end% %mayorsystem_leaderboard_3_name% <dark_gray>-</dark_gray> <gold>%mayorsystem_leaderboard_3_votes%</gold>"
    closed_lines:
      - "<gold><bold>%title_name% Elections</bold></gold>"
      - "%style_error%Voting is closed%style_error_end%"
      - ""
      - "<gray>Next term:</gray> <white>#%mayorsystem_leaderboard_term%</white>"
      - "<gray>Next election opens:</gray> <white>%mayorsystem_election_open%</white>"
      - "<gray>Come back during the vote window.</gray>"

public:
  loading: "%style_warning%%title_name% system is still loading. Try again in a moment.%style_warning_end%"
  closed: "%style_error%%title_name% services are currently closed.%style_error_end%"
  disabled: "%style_error%The %title_name% system is disabled.%style_error_end%"
  paused: "%style_warning%The %title_name% system is paused.%style_warning_end%"
  apply_closed: "%style_warning%Applications are closed right now.%style_warning_end%"
  apply_playtime: "%style_warning%You need <white>%minutes%</white> minutes of playtime to apply.%style_warning_end%"
  apply_already: "%style_warning%You are already registered for term <white>#%term%</white>.%style_warning_end%"
  vote_closed: "%style_warning%Voting is closed.%style_warning_end%"
  vote_already: "%style_warning%Your vote is already recorded this term.%style_warning_end%"
  vote_page_first: "%style_warning%Already on the first page.%style_warning_end%"
  vote_page_last: "%style_warning%Already on the last page.%style_warning_end%"
  vote_not_allowed: "%style_warning%You can't vote for this candidate right now.%style_warning_end%"
  vote_term_changed: "%style_warning%That election term changed. Please vote again.%style_warning_end%"
  vote_candidate_ineligible: "%style_warning%That candidate is not eligible right now.%style_warning_end%"
  stepdown_closed: "%style_warning%Step down is only available while elections are open.%style_warning_end%"
  stepdown_not_candidate: "%style_warning%You are not currently a candidate.%style_warning_end%"
  stepdown_done: "<gradient:#56ab2f:#a8e063><bold>Step-down complete</bold></gradient> <gray>See you next term.</gray>"
  stepdown_disabled: "%style_error%Step down is currently disabled.%style_error_end%"
  mayor_stepdown_disabled: "%style_error%%title_name% step down is currently disabled.%style_error_end%"
  stepdown_reapply_disabled: "%style_error%Re-applying after stepping down is disabled for this term.%style_error_end%"
  stepdown_unavailable: "%style_warning%Unable to step down right now.%style_warning_end%"
  candidate_not_found: "%style_warning%Candidate not found: <white>%name%</white>%style_warning_end%"
  candidates_available: "<gray>Available candidates:</gray> <white>%names%</white>"
  candidate_in_process: "%style_warning%That candidate is under review and cannot receive votes.%style_warning_end%"
  apply_first_candidate: "%style_warning%Apply first to become a candidate.%style_warning_end%"
  apply_first_bio: "%style_warning%Apply first, then you can set your bio.%style_warning_end%"
  custom_requests_closed: "%style_warning%You can't request custom perks right now.%style_warning_end%"
  custom_requests_limit: "%style_warning%You reached the custom perk request limit for this term (%limit%).%style_warning_end%"
  perk_limit: "%style_warning%You can only select %limit% perks.%style_warning_end%"
  vote_cast: "<gradient:#4facfe:#00f2fe><bold>Vote recorded</bold></gradient> <white>%name%</white>"
  vote_updated: "<gradient:#43e97b:#38f9d7><bold>Vote updated</bold></gradient> <white>%name%</white>"
  sell_bonus: "<gradient:#f7971e:#ffd200><bold>%name% Multiplier</bold></gradient> <dark_gray>>></dark_gray> %style_success%+%bonus%%style_success_end% <gray>(x%multiplier%)</gray>"
  perk_section_limit: "%style_warning%Section limit reached for <white>%section%</white> <gray>(max %limit%)</gray>.%style_warning_end%"
  perk_section_violation: "%style_warning%Section limits exceeded:%style_warning_end% <white>%sections%</white>"
  apply_ban_permanent: "%style_warning%You are permanently banned from applying to %title_name_lower% elections.%style_warning_end%"
  apply_ban_temporary: "%style_warning%You are temporarily banned from applying. Try again in %minutes% minutes.%style_warning_end%"
  apply_removed: "%style_warning%You were removed from this election and cannot re-apply this term.%style_warning_end%"
  apply_perk_exact: "%style_warning%You must select exactly %limit% perks before applying. (Selected: %selected%)%style_warning_end%"
  economy_missing: "%style_warning%Economy not available (Vault + a compatible economy plugin required).%style_warning_end%"
  apply_insufficient_funds: "%style_warning%Not enough money to apply.%style_warning_end%"
  apply_payment_failed: "%style_warning%Payment failed.%style_warning_end%"
  apply_failed_refunded: "%style_error%Application failed. Your payment was refunded.%style_error_end%"
  apply_submitted: "%style_success%You applied for term <white>#%term%</white>. Good luck!%style_success_end%"
  custom_requests_reason: "<gray>Reason:</gray> %reason%"
  mayor_stepdown_accepted: "%style_success%Step down accepted. Election opened for term <white>#%term%</white>.%style_success_end%"
  vote_already_same: "%style_warning%You're already voting for <white>%name%</white>.%style_warning_end%"

admin:
  open:
    invalid_menu: "%style_error%Unknown menu id:%style_error_end% <white>%id%</white>"
    available: "<gray>Available menu ids:</gray> <white>%ids%</white>"
  system:
    master_off: "%style_error%Master switch is OFF (enabled=false). Turn it on in config.yml first.%style_error_end%"
    public_enabled: "<gradient:#56ab2f:#a8e063><bold>Public access enabled</bold></gradient>"
    public_disabled: "%style_warning%Public access is now disabled (staff still have access).%style_warning_end%"
    offline_cache_refreshed: "%style_success%Offline player cache refresh queued.%style_success_end%"
  applyban:
    permanent: "%style_warning%%name%%style_warning_end% %style_error%has been permanently banned from applying.%style_error_end%"
    temp: "%style_warning%%name%%style_warning_end% %style_error%has been banned for <white>%days%</white> day(s).%style_error_end%"
    cleared: "%style_success%Apply ban cleared for <white>%name%</white>.%style_success_end%"
  perks:
    refresh_all: "%style_success%Refreshed perk effects for <white>%count%</white> online player(s).%style_success_end%"
    refresh_player: "%style_success%Refreshed perk effects for <white>%name%</white>.%style_success_end%"
    refresh_player_not_found: "%style_warning%Player not found online:%style_warning_end% <white>%name%</white>"
    request_approved: "<gradient:#00c6ff:#0072ff><bold>Request approved</bold></gradient> <white>#%id%</white>"
    request_denied: "%style_warning%Denied request <white>#%id%</white>.%style_warning_end%"
    request_action_invalid: "%style_error%Action must be: approve/deny%style_error_end%"
    section_not_found: "%style_warning%Section not found:%style_warning_end% <white>%section%</white>"
    perk_not_found: "%style_warning%Perk not found:%style_warning_end% <white>%section%/%perk%</white>"
    state_invalid: "%style_error%State must be: toggle/on/off%style_error_end%"
    section_updated: "%style_success%Section <white>%section%</white> is now <white>%state%</white>.%style_success_end%"
    perk_updated: "%style_success%Perk <white>%section%/%perk%</white> is now <white>%state%</white>.%style_success_end%"
    section_limit: "%style_warning%Section limit reached for <white>%section%</white> <gray>(max %limit%)</gray>.%style_warning_end%"
    section_limit_violation: "%style_warning%Section limits exceeded:%style_warning_end% <white>%sections%</white>"
    perk_limit: "%style_warning%You can only select %limit% perks.%style_warning_end%"
    perk_exact: "%style_warning%You must select exactly %limit% perks. (Selected: %selected%)%style_warning_end%"
  election:
    started: "<gradient:#f6d365:#fda085><bold>Election started</bold></gradient> <gray>(schedule shifted)</gray>"
    start_failed: "%style_error%Failed to start the election.%style_error_end%"
    ended: "<gradient:#f6d365:#fda085><bold>Election ended</bold></gradient> <gray>New term started.</gray>"
    end_failed: "%style_error%Failed to end the election.%style_error_end%"
    term_changed: "%style_warning%Election term changed. Please try again.%style_warning_end%"
    force_failed: "%style_error%Failed to force-elect.%style_error_end%"
    no_permission_start: "%style_error%You do not have permission to start elections.%style_error_end%"
    no_permission_end: "%style_error%You do not have permission to end elections.%style_error_end%"
    no_permission_force: "%style_error%You do not have permission to force-elect a %title_name_lower%.%style_error_end%"
    no_permission_clear: "%style_error%You do not have permission to clear election overrides.%style_error_end%"
    overrides_cleared: "%style_success%Cleared admin overrides for term <white>#%term%</white>.%style_success_end%"
    forced_mayor_set: "%style_success%Forced %title_name_lower% set for term <white>#%term%</white>: <white>%name%</white>.%style_success_end%"
    forced_mayor_hint: "<gray>(This does not start the term yet.)</gray>"
    forced_mayor_cleared: "%style_success%Cleared forced %title_name_lower% for term <white>#%term%</white>.%style_success_end%"
    force_elected_now: "%style_success%Force-elected <white>%name%</white> and started the new term.%style_success_end%"
  settings:
    value_bool_invalid: "%style_error%Value must be true/false.%style_error_end%"
    options_invalid: "%style_error%Invalid option. Use one of:%style_error_end% <white>%options%</white>"
    duration_invalid: "%style_error%Invalid duration. Use ISO-8601 like <white>%example%</white>.%style_error_end%"
    datetime_invalid: "%style_error%Invalid date-time. Use ISO-8601 with offset.%style_error_end%"
    apply_cost_invalid: "%style_error%Invalid cost.%style_error_end%"
    enabled_set: "%style_success%Plugin enabled set to <white>%value%</white>.%style_success_end%"
    public_enabled_set: "%style_success%Public access set to <white>%value%</white>.%style_success_end%"
    pause_enabled_set: "%style_success%Pause schedule set to <white>%value%</white>.%style_success_end%"
    mayor_group_enabled_set: "%style_success%%title_name% LuckPerms group sync set to <white>%value%</white>.%style_success_end%"
    mayor_group_set: "%style_success%%title_name% LuckPerms group set to <white>%value%</white>.%style_success_end%"
    mayor_group_invalid: "%style_error%Invalid group. Use letters, numbers, _, -, or . only.%style_error_end%"
    mayor_group_synced: "%style_success%%title_name% LuckPerms group sync refreshed.%style_success_end%"
    enable_options_set: "%style_success%Enable option%style_success_end% <white>%option%</white> %style_success%is now%style_success_end% <white>%state%</white>%style_success%.%style_success_end%"
    pause_options_set: "%style_success%Pause option%style_success_end% <white>%option%</white> %style_success%is now%style_success_end% <white>%state%</white>%style_success%.%style_success_end%"
    election_reset: "%style_success%Election terms reset. Term counter set to 0 and %title_name_lower% cleared.%style_success_end%"
    term_length_set: "%style_success%Term length set to <white>%value%</white>.%style_success_end%"
    vote_window_set: "%style_success%Vote window set to <white>%value%</white>.%style_success_end%"
    first_term_start_set: "%style_success%First term start set to <white>%value%</white>.%style_success_end%"
    playtime_set: "%style_success%Apply playtime minutes set to <white>%value%</white>.%style_success_end%"
    apply_cost_set: "%style_success%Apply cost set to <white>%value%</white>.%style_success_end%"
    perks_per_term_set: "%style_success%Perks per term set to <white>%value%</white>.%style_success_end%"
    election_timing_set: "%style_success%Election timing set to <white>%value%</white>.%style_success_end%"
    election_timing_invalid: "%style_error%Invalid timing. Use while_term or after_term.%style_error_end%"
    custom_limit_set: "%style_success%Custom request limit set to <white>%value%</white>.%style_success_end%"
    custom_condition_invalid: "%style_error%Invalid condition. Use NONE, ELECTED_ONCE, or APPLY_REQUIREMENTS.%style_error_end%"
    custom_condition_set: "%style_success%Custom request condition set to <white>%value%</white>.%style_success_end%"
    chat_prompts_invalid: "%style_error%Field must be: bio/title/description%style_error_end%"
    chat_prompts_set: "%style_success%Chat prompt %field% max length set to <white>%value%</white>.%style_success_end%"
    chat_prompt_timeout_set: "%style_success%Chat prompt timeout set to <white>%value%</white> seconds.%style_success_end%"
    bonus_enabled_set: "%style_success%Bonus terms enabled set to <white>%value%</white>.%style_success_end%"
    bonus_every_set: "%style_success%Bonus term interval set to <white>%value%</white>.%style_success_end%"
    bonus_perks_set: "%style_success%Bonus perks set to <white>%value%</white>.%style_success_end%"
    allow_vote_change_set: "%style_success%Allow vote change set to <white>%value%</white>.%style_success_end%"
    tie_policy_invalid: "%style_error%Invalid tie policy. Use SEEDED_RANDOM, INCUMBENT, EARLIEST_APPLICATION, or ALPHABETICAL.%style_error_end%"
    tie_policy_set: "%style_success%Tie policy set to <white>%value%</white>.%style_success_end%"
    stepdown_reapply_set: "%style_success%Step down re-apply set to <white>%value%</white>.%style_success_end%"
    mayor_stepdown_invalid: "%style_error%Invalid mode. Use OFF, NO_MAYOR, or KEEP_MAYOR.%style_error_end%"
    mayor_stepdown_set: "%style_success%%title_name% step down mode set to <white>%value%</white>.%style_success_end%"
    sell_all_stack_set: "%style_success%All sell bonus stacks with category bonuses set to <white>%value%</white>.%style_success_end%"
    reloaded: "<gradient:#00c6ff:#0072ff><bold>Reload complete</bold></gradient>"
  candidate:
    not_found: "%style_warning%Candidate not found:%style_warning_end% <white>%name%</white>"
    list: "<gray>Candidates this term:</gray> <white>%names%</white>"
    status_set: "%style_success%%name% set to <white>%status%</white> for term <white>#%term%</white>.%style_success_end%"
    removed: "%style_warning%%name% removed from term <white>#%term%</white> election.%style_warning_end%"
  candidates:
    no_permission_restore: "%style_error%You do not have permission to restore candidates.%style_error_end%"
    no_permission_process: "%style_error%You do not have permission to process candidates.%style_error_end%"
    no_permission_remove: "%style_error%You do not have permission to remove candidates.%style_error_end%"
    no_permission_applyban: "%style_error%You do not have permission to manage apply bans.%style_error_end%"
    must_process: "%style_warning%Candidate must be PROCESS before removal.%style_warning_end%"
    already_removed: "%style_warning%%name% is already REMOVED.%style_warning_end%"
  online_players:
    none: "<gray>Online players:</gray> <white>(none)</white>"
    list: "<gray>Online players:</gray> <white>%names%</white><gray>%suffix%</gray>"

  npc:
    not_available: "%style_error%No supported NPC plugin found. Install Citizens or FancyNpcs first (then retry /%title_command% admin npc spawn).%style_error_end%"
    spawned: "%style_success%%title_name% NPC spawned using <white>%provider%</white>.%style_success_end%"
    removed: "%style_warning%%title_name% NPC removed.%style_warning_end%"
    updated: "<gray>%title_name% NPC update requested.</gray>"

  hologram:
    spawned: "%style_success%Leaderboard hologram spawned.%style_success_end%"
    removed: "%style_warning%Leaderboard hologram removed.%style_warning_end%"
    updated: "<gray>Leaderboard hologram updated.</gray>"
    not_available: "%style_error%DecentHolograms is not installed.%style_error_end%"
    switching_hint: "%style_warning%Showcase mode is SWITCHING. This sets the shared display location.%style_warning_end%"

  showcase:
    mode_set: "%style_success%Showcase mode set to <white>%mode%</white>.%style_success_end%"
    target_locked: "%style_error%Showcase mode is SWITCHING. Target display is <white>%target%</white>. Use /%title_command% admin display mode individual to manage both.%style_error_end%"
    mode_invalid: "%style_error%Mode must be SWITCHING or INDIVIDUAL.%style_error_end%"

  monitoring:
    audit_event: "<gray>Audit event:</gray> <white>%action%</white>"
    exported: "%style_success%Exported:%style_success_end% <white>%file%</white>"
    health_printed_for: "<gray>Printed report to console for:</gray> <white>%id%</white>"
    health_printed: "%style_success%Health report printed to console.%style_success_end%"

errors:
  player_only: "%style_error%This command can only be used by players.%style_error_end%"
  no_permission: "%style_error%You do not have permission to do that.%style_error_end%"
  action_in_progress: "%style_warning%That action is already running.%style_warning_end% <gray>Please wait for it to finish.</gray>"
  action_failed: "%style_error%That action failed.%style_error_end% <gray>Check console for details.</gray>"

cooldown:
  wait: "%style_warning%Please wait <white>%seconds%s</white> before using that again.%style_warning_end%"

prompts:
  expired: "%style_info%Your prompt expired (timeout). Start again from the menu.%style_info_end%"
  cancelled: "%style_info%Cancelled.%style_info_end%"
  tip_cancel_spam: "%style_warning%Tip:%style_warning_end% <gray>You cancelled prompts several times. Using the menu button is usually easier.</gray>"
  custom:
    title_prompt: "<gold>Custom perk request:</gold> Type the <white>title</white> in chat. <dark_gray>(max %max% chars)</dark_gray> <gray>(type 'cancel' to abort)</gray>"
    title_too_long: "%style_error%Title too long.%style_error_end% <gray>Max %max% characters.</gray>"
    description_prompt: "<gold>Now type the <white>description</white>.</gold> <dark_gray>(max %max% chars)</dark_gray> <gray>(type 'cancel' to abort)</gray>"
    description_too_long: "%style_error%Description too long.%style_error_end% <gray>Max %max% characters.</gray>"
    closed: "%style_error%Election is closed. Request not submitted.%style_error_end%"
    must_candidate: "%style_error%You must be an active candidate to submit requests.%style_error_end%"
    limit_reached: "%style_error%Request limit reached.%style_error_end%"
    limit_value: "<gray>Limit:</gray> <white>%limit%</white>"
    submitted: "%style_success%Submitted request%style_success_end% <white>#%id%</white>%style_success%.%style_success_end%"
    admin_review: "<gray>Admins will approve/deny it from the UI.</gray>"
  bio:
    start:
      - "<gold>Candidate bio:</gold> Type your bio in chat. <dark_gray>(max %max% chars)</dark_gray> <gray>(type 'cancel' to abort)</gray>"
      - "<dark_gray>Tip: keep it short. You can edit again any time.</dark_gray>"
    too_long: "%style_error%Bio too long.%style_error_end% <gray>Max %max% characters.</gray>"
    saved: "%style_success%Bio saved.%style_success_end%"





